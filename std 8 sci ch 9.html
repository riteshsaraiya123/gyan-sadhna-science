<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જ્ઞાન સાધના ક્વિઝ - વિજ્ઞાન (પ્રકરણ ૯)</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); font-size: 24px; margin: 0; }
        .quiz-container { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: #555; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question { font-size: 19px; font-weight: 600; margin-bottom: 20px; color: #333; line-height: 1.4; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 17px; transition: all 0.3s ease; font-weight: 500; color: #444; }
        .option:hover { background: #f8f9fa; border-color: var(--secondary); }
        .option:disabled { cursor: not-allowed; }
        .correct { background-color: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background-color: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .answer-text { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f4fd; display: none; font-size: 16px; font-weight: bold; color: #2c3e50; border-left: 5px solid var(--secondary); animation: fadeIn 0.5s; }
        .next-btn { width: 100%; padding: 15px; margin-top: 25px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        .next-btn:hover { background: #2980b9; }
        
        /* રિઝલ્ટ અને સમરી માટે CSS */
        .score-board { text-align: center; display: none; padding: 10px 0; }
        .score-board h2 { font-size: 28px; color: var(--primary); margin-bottom: 5px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--secondary); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 15px auto; }
        .summary-box { margin-top: 20px; text-align: left; max-height: 350px; overflow-y: auto; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
        .summary-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .summary-item p { margin: 5px 0; font-size: 15px; }
        .summary-q { font-weight: bold; color: #333; }
        
        .footer { margin-top: 30px; text-align: center; font-size: 14px; color: #7f8c8d; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>પ્રકરણ ૯ : ઘર્ષણ</h1>
</div>

<div class="quiz-container">
    <div id="quiz-box">
        <div class="progress-container">
            <span id="progressText">પ્રશ્ન: 1 / 30</span>
            <span id="scoreText">સ્કોર: 0</span>
        </div>
        <div class="question" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div id="answerFeedback" class="answer-text"></div>
        <button id="nextBtn" class="next-btn" onclick="loadNextQuestion()">આગળનો પ્રશ્ન ➔</button>
    </div>

    <div id="scoreBox" class="score-board">
        <h2>ક્વિઝ પૂર્ણ! 🏆</h2>
        <div class="score-circle"><span id="finalScore">0</span></div>
        <p style="font-size: 18px; color: #555; margin: 5px 0;">કુલ પ્રશ્નો: <span id="totalQuestions">30</span></p>
        
        <h3 style="color: var(--primary); margin-top: 25px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 5px;">તમારું પ્રદર્શન (Summary):</h3>
        <div id="summaryContainer" class="summary-box"></div>

        <button class="next-btn" style="display:block; margin-top: 20px;" onclick="location.reload()">ફરીથી રમો ↻</button>
    </div>
</div>

<div class="footer">
    બનાવનાર: રિતેશ સરૈયા | પ્રાથમિક શાળા નાયકીવાડ વાંઝણા
</div>

<script>
    const rawQuestions = [
        { q: "ઘર્ષણ બળ હંમેશા ગતિમાન પદાર્થની કઈ દિશામાં લાગે છે?", ans: "ગતિની વિરુદ્ધ દિશામાં", distractors: ["ગતિની દિશામાં", "લંબ દિશામાં", "કોઈ પણ દિશામાં"] },
        { q: "બે સપાટીઓ વચ્ચે ઘર્ષણ ઉત્પન્ન થવાનું મુખ્ય કારણ શું છે?", ans: "સપાટીઓનું ખરબચડાપણું / સૂક્ષ્મ ખાંચાઓનું જોડાણ", distractors: ["સપાટીઓનું લીસાપણું", "પદાર્થનું વજન", "હવાનું દબાણ"] },
        { q: "જો સપાટીને વધુ લીસી (Smooth) બનાવવામાં આવે, તો ઘર્ષણ બળમાં શું ફેરફાર થાય છે?", ans: "ઘર્ષણ બળ ઘટે છે", distractors: ["ઘર્ષણ બળ વધે છે", "શૂન્ય થઈ જાય છે", "કોઈ ફેરફાર થતો નથી"] },
        { q: "બે સપાટીઓને એકબીજા સાથે જોરથી દબાવવામાં આવે તો ઘર્ષણ બળ પર શું અસર થાય?", ans: "ઘર્ષણ બળ વધે છે", distractors: ["ઘર્ષણ બળ ઘટે છે", "શૂન્ય થાય છે", "સમાન રહે છે"] },
        { q: "ભારે વજનવાળા પદાર્થને ખસેડવા માટે હળવા પદાર્થની સરખામણીમાં કેવું ઘર્ષણ બળ લાગે છે?", ans: "વધુ ઘર્ષણ બળ", distractors: ["ઓછું ઘર્ષણ બળ", "સમાન ઘર્ષણ બળ", "શૂન્ય ઘર્ષણ બળ"] },
        { q: "સ્થિર પદાર્થને ગતિમાં લાવવા માટે કયા ઘર્ષણ બળનો સામનો કરવો પડે છે?", ans: "સ્થિત ઘર્ષણ", distractors: ["સરકતું ઘર્ષણ", "લોટણ ઘર્ષણ", "તરલ ઘર્ષણ"] },
        { q: "ગતિમાન પદાર્થની અચળ ગતિ ચાલુ રાખવા માટે કયું ઘર્ષણ બળ લાગે છે?", ans: "સરકતું ઘર્ષણ / Sliding Friction", distractors: ["સ્થિત ઘર્ષણ", "લોટણ ઘર્ષણ", "ચુંબકીય ઘર્ષણ"] },
        { q: "પદાર્થ જ્યારે બીજી સપાટી પર ગબડતો (Roll થતો) હોય ત્યારે કયું ઘર્ષણ લાગે છે?", ans: "લોટણ ઘર્ષણ / Rolling Friction", distractors: ["સરકતું ઘર્ષણ", "સ્થિત ઘર્ષણ", "તરલ ઘર્ષણ"] },
        { q: "સ્થિત, સરકતા અને લોટણ ઘર્ષણમાંથી સૌથી ઓછું મૂલ્ય કોનું હોય છે?", ans: "લોટણ ઘર્ષણનું", distractors: ["સરકતા ઘર્ષણનું", "સ્થિત ઘર્ષણનું", "બધાનું સમાન હોય છે"] },
        { q: "સૌથી વધુ મૂલ્ય કયા ઘર્ષણ બળનું હોય છે?", ans: "સ્થિત ઘર્ષણનું", distractors: ["સરકતા ઘર્ષણનું", "લોટણ ઘર્ષણનું", "તરલ ઘર્ષણનું"] },
        { q: "સરકતા ઘર્ષણનું મૂલ્ય સ્થિત ઘર્ષણ કરતાં કેવું હોય છે?", ans: "ઓછું હોય છે", distractors: ["વધુ હોય છે", "સમાન હોય છે", "બમણું હોય છે"] },
        { q: "વાહનોના ટાયર ખાંચાવાળા શા માટે બનાવવામાં આવે છે?", ans: "રસ્તા સાથેનું ઘર્ષણ વધારવા માટે", distractors: ["સુંદર દેખાવા માટે", "ઘર્ષણ ઘટાડવા માટે", "વજન ઘટાડવા માટે"] },
        { q: "રમતવીરો (એથ્લેટ્સ) અને પર્વતારોહકો ખીલીવાળા બૂટ (Spikes) કેમ પહેરે છે?", ans: "જમીન સાથે પકડ/ઘર્ષણ વધારવા", distractors: ["ઝડપથી દોડવા", "વજન ઘટાડવા", "ફેશન માટે"] },
        { q: "કબડ્ડીના ખેલાડીઓ પોતાના હાથ પર માટી શા માટે ઘસે છે?", ans: "ઘર્ષણ વધારીને પકડ મજબૂત કરવા", distractors: ["હાથ સાફ કરવા", "ઘર્ષણ ઘટાડવા", "પરસેવો લૂછવા"] },
        { q: "સાયકલ અને વાહનોમાં બ્રેક પેડનો ઉપયોગ શા માટે થાય છે?", ans: "ઘર્ષણ વધારીને વાહનને રોકવા", distractors: ["ઘર્ષણ ઘટાડવા", "ઝડપ વધારવા", "સુંદરતા માટે"] },
        { q: "કેરમ બોર્ડ પર પાવડર છાંટવાથી ઘર્ષણમાં શું થાય છે?", ans: "ઘટાડો થાય છે", distractors: ["વધારો થાય છે", "બમણું થાય છે", "કોઈ ફેરફાર થતો નથી"] },
        { q: "મશીનોના ગતિશીલ ભાગો વચ્ચે ઘર્ષણ ઘટાડવા વપરાતા પદાર્થને શું કહે છે?", ans: "ઊંજણ / Lubricant", distractors: ["બળતણ", "એસિડ", "પેઇન્ટ"] },
        { q: "ઊંજણ (Lubricant) તરીકે કયા પદાર્થોનો સામાન્ય રીતે ઉપયોગ થાય છે?", ans: "તેલ, ગ્રીસ અથવા ગ્રેફાઇટ", distractors: ["પાણી અને રેતી", "એસિડ અને બેઝ", "પેટ્રોલ અને ડીઝલ"] },
        { q: "છતના પંખા અને સાયકલમાં ઘર્ષણ ઘટાડવા માટે કઈ રચનાનો ઉપયોગ થાય છે?", ans: "બૉલ બેરિંગ / Ball Bearing", distractors: ["બ્રેક પેડ", "સ્પ્રિંગ", "ખાંચાવાળા ટાયર"] },
        { q: "સૂટકેસ અને ભારે સામાનમાં નીચે પૈડાં (Rollers) શા માટે લગાવવામાં આવે છે?", ans: "સરકતા ઘર્ષણને લોટણ ઘર્ષણમાં ફેરવી સરળતાથી ખેંચવા", distractors: ["સુંદર દેખાવા", "વજન વધારવા", "ઘર્ષણ વધારવા"] },
        { q: "કાગળ પર પેન કે પેન્સિલથી લખી શકવા માટે કયું બળ જવાબદાર છે?", ans: "ઘર્ષણ બળ", distractors: ["ગુરુત્વાકર્ષણ બળ", "ચુંબકીય બળ", "સ્થિર વિદ્યુત બળ"] },
        { q: "દીવાલમાં ખીલી ઠોકી શકવા માટે કયું બળ જરૂરી છે?", ans: "ઘર્ષણ બળ", distractors: ["ગુરુત્વાકર્ષણ બળ", "ચુંબકીય બળ", "સ્નાયુબળ માત્ર"] },
        { q: "માચિસની સળીને બોક્સની બાજુ પર ઘસતાં તે સળગી ઉઠે છે, આ માટે કયું બળ જવાબદાર છે?", ans: "ઘર્ષણ બળ", distractors: ["ચુંબકીય બળ", "ગુરુત્વાકર્ષણ બળ", "તરલ બળ"] },
        { q: "મશીનો ચાલવાથી ગરમ થઈ જાય છે, તેમાં કઈ ઊર્જાનો વ્યય થાય છે?", ans: "ઉષ્મા ઊર્જા - ઘર્ષણને કારણે", distractors: ["પ્રકાશ ઊર્જા", "રાસાયણિક ઊર્જા", "ધ્વનિ ઊર્જા"] },
        { q: "બૂટ-ચંપલના તળિયા ઘસાઈ જવાનું કારણ કયું બળ છે?", ans: "ઘર્ષણ બળ", distractors: ["ગુરુત્વાકર્ષણ બળ", "ચુંબકીય બળ", "તરલ બળ"] },
        { q: "હવા અને પાણી જેવા વહેતા પદાર્થોને વિજ્ઞાનની ભાષામાં સામાન્ય રીતે શું કહેવાય છે?", ans: "તરલ / Fluid", distractors: ["ઘન", "પ્લાઝ્મા", "શૂન્યાવકાશ"] },
        { q: "તરલ (પ્રવાહી કે વાયુ) દ્વારા લાગતા ઘર્ષણ બળને શું કહે છે?", ans: "ઘસડાવું / Drag", distractors: ["સરકવું", "ગબડવું", "તરવું"] },
        { q: "વિમાન અને રોકેટનો આકાર આગળથી અણીદાર અને પક્ષી જેવો શા માટે બનાવવામાં આવે છે?", ans: "હવાનું ઘર્ષણ બળ ઘટાડવા", distractors: ["સુંદર દેખાવા", "હવાનું ઘર્ષણ વધારવા", "વજન ઘટાડવા"] },
        { q: "હોડી, જહાજ અને સબમરીનનો આકાર કોના જેવો (સુવાહીત) બનાવવામાં આવે છે?", ans: "માછલી જેવો", distractors: ["પક્ષી જેવો", "સાપ જેવો", "કાચબા જેવો"] },
        { q: "આકાશમાંથી પડતો ઉલ્કાપિંડ પૃથ્વીના વાતાવરણમાં પ્રવેશે ત્યારે સળગી ઊઠવા પાછળ હવાનું કયું બળ જવાબદાર છે?", ans: "હવાનું ઘર્ષણ બળ", distractors: ["હવાનું દબાણ", "ગુરુત્વાકર્ષણ બળ", "ચુંબકીય બળ"] }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let questions = [];
    let userAnswersData = [];
    let currentIdx = 0;
    let score = 0;

    function initQuiz() {
        let processedData = rawQuestions.map(qObj => {
            let options = [qObj.ans, ...qObj.distractors];
            return {
                q: qObj.q,
                correctAnswer: qObj.ans,
                options: shuffleArray(options)
            };
        });
        questions = shuffleArray(processedData);
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentIdx];
        document.getElementById("progressText").innerText = `પ્રશ્ન: ${currentIdx + 1} / ${questions.length}`;
        document.getElementById("scoreText").innerText = `સ્કોર: ${score}`;
        document.getElementById("questionText").innerText = qData.q;
        
        const optionsDiv = document.getElementById("optionsContainer");
        optionsDiv.innerHTML = "";
        
        document.getElementById("answerFeedback").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";

        qData.options.forEach((opt) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, qData.correctAnswer, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selectedOpt, correctOpt, btn) {
        const allOptions = document.querySelectorAll(".option");
        let isCorrect = (selectedOpt === correctOpt);

        userAnswersData.push({
            question: questions[currentIdx].q,
            selected: selectedOpt,
            correct: correctOpt,
            isRight: isCorrect
        });

        allOptions.forEach(optBtn => {
            optBtn.disabled = true;
            if(optBtn.innerText === correctOpt) {
                optBtn.dataset.isCorrect = "true";
            }
        });

        if (isCorrect) {
            btn.classList.add("correct");
            score++;
            document.getElementById("scoreText").innerText = `સ્કોર: ${score}`;
        } else {
            btn.classList.add("wrong");
            allOptions.forEach(optBtn => {
                if(optBtn.dataset.isCorrect === "true") {
                    optBtn.classList.add("correct");
                }
            });
            
            const feedback = document.getElementById("answerFeedback");
            feedback.innerHTML = `❌ તમારો જવાબ ખોટો છે.<br>✅ <b>સાચો જવાબ:</b> ${correctOpt}`;
            feedback.style.display = "block";
        }
        
        document.getElementById("nextBtn").style.display = "block";
    }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("scoreBox").style.display = "block";
        document.getElementById("finalScore").innerText = score;
        document.getElementById("totalQuestions").innerText = questions.length;

        let summaryHTML = "";
        userAnswersData.forEach((data, index) => {
            let color = data.isRight ? "green" : "red";
            let icon = data.isRight ? "✅" : "❌";
            
            summaryHTML += `<div class="summary-item">
                <p class="summary-q">${index + 1}. ${data.question}</p>
                <p style="color: ${color}; font-weight: bold;">${icon} તમારો જવાબ: ${data.selected}</p>`;
                
            if (!data.isRight) {
                summaryHTML += `<p style="color: green; font-weight: bold;">✅ સાચો જવાબ: ${data.correct}</p>`;
            }
            summaryHTML += `</div>`;
        });
        
        document.getElementById("summaryContainer").innerHTML = summaryHTML;
    }

    initQuiz();
</script>

</body>
</html>
