    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    function init() {
        let pool = shuffle([...db]);
        quizData = pool.slice(0, Math.min(limit, db.length)); 
        loadQ();
    }

    function loadQ() {
        const d = quizData[cur];
        document.getElementById("qCountDisp").innerText = `પ્રશ્ન: ${cur + 1} / ${quizData.length}`;
        document.getElementById("scoreDisp").innerText = `સ્કોર: ${score}`;
        document.getElementById("chDisp").innerText = `પાઠ નંબર: ${d.ch}`;
        document.getElementById("qText").innerText = d.q;
        const o = document.getElementById("opts"); o.innerHTML = "";
        document.getElementById("next").style.display = "none";

        shuffle([d.ans, ...d.ds]).forEach(choice => {
            const b = document.createElement("button");
            b.className = "opt"; b.innerText = choice;
            b.onclick = () => {
                document.querySelectorAll(".opt").forEach(btn => btn.disabled = true);
                if(choice === d.ans) { b.classList.add("correct"); score++; }
                else { 
                    b.classList.add("wrong");
                    document.querySelectorAll(".opt").forEach(btn => {
                        if(btn.innerText === d.ans) btn.classList.add("correct");
                    });
                }
                document.getElementById("next").style.display = "block";
            };
            o.appendChild(b);
        });
    }

    function nextQ() {
        cur++;
        if(cur < quizData.length) loadQ();
        else {
            document.getElementById("qBox").style.display = "none";
            document.getElementById("resBox").style.display = "block";
            document.getElementById("fScore").innerText = score;
            document.getElementById("fTotal").innerText = quizData.length;
        }
    }
    init();
</script>
