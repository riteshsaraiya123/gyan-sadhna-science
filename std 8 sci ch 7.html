<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જ્ઞાન સાધના ક્વિઝ - વિજ્ઞાન (પ્રકરણ ૭)</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); font-size: 24px; margin: 0; }
        .quiz-container { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: #555; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question { font-size: 19px; font-weight: 600; margin-bottom: 20px; color: #333; line-height: 1.4; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 17px; transition: all 0.3s ease; font-weight: 500; color: #444; }
        .option:hover { background: #f8f9fa; border-color: var(--secondary); }
        .option:disabled { cursor: not-allowed; }
        .correct { background-color: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background-color: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .answer-text { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f4fd; display: none; font-size: 16px; font-weight: bold; color: #2c3e50; border-left: 5px solid var(--secondary); animation: fadeIn 0.5s; }
        .next-btn { width: 100%; padding: 15px; margin-top: 25px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        .next-btn:hover { background: #2980b9; }
        
        /* રિઝલ્ટ અને સમરી માટે CSS */
        .score-board { text-align: center; display: none; padding: 10px 0; }
        .score-board h2 { font-size: 28px; color: var(--primary); margin-bottom: 5px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--secondary); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 15px auto; }
        .summary-box { margin-top: 20px; text-align: left; max-height: 350px; overflow-y: auto; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
        .summary-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .summary-item p { margin: 5px 0; font-size: 15px; }
        .summary-q { font-weight: bold; color: #333; }
        
        .footer { margin-top: 30px; text-align: center; font-size: 14px; color: #7f8c8d; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>પ્રકરણ ૭ : તરુણાવસ્થા તરફ</h1>
</div>

<div class="quiz-container">
    <div id="quiz-box">
        <div class="progress-container">
            <span id="progressText">પ્રશ્ન: 1 / 50</span>
            <span id="scoreText">સ્કોર: 0</span>
        </div>
        <div class="question" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div id="answerFeedback" class="answer-text"></div>
        <button id="nextBtn" class="next-btn" onclick="loadNextQuestion()">આગળનો પ્રશ્ન ➔</button>
    </div>

    <div id="scoreBox" class="score-board">
        <h2>ક્વિઝ પૂર્ણ! 🏆</h2>
        <div class="score-circle"><span id="finalScore">0</span></div>
        <p style="font-size: 18px; color: #555; margin: 5px 0;">કુલ પ્રશ્નો: <span id="totalQuestions">50</span></p>
        
        <h3 style="color: var(--primary); margin-top: 25px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 5px;">તમારું પ્રદર્શન (Summary):</h3>
        <div id="summaryContainer" class="summary-box"></div>

        <button class="next-btn" style="display:block; margin-top: 20px;" onclick="location.reload()">ફરીથી રમો ↻</button>
    </div>
</div>

<div class="footer">
    બનાવનાર: રિતેશ સરૈયા | પ્રાથમિક શાળા નાયકીવાડ વાંઝણા
</div>

<script>
    const rawQuestions = [
        { q: "મનુષ્યના જીવનકાળની એવી અવસ્થા જેમાં શરીરમાં પ્રજનનની પરિપક્વતા આવે છે તેને શું કહેવાય?", ans: "તરુણાવસ્થા / Adolescence", distractors: ["બાળપણ", "યુવાવસ્થા", "વૃદ્ધાવસ્થા"] },
        { q: "તરુણાવસ્થાની શરૂઆત સામાન્ય રીતે કઈ ઉંમરે થાય છે?", ans: "૧૦ થી ૧૧ વર્ષની ઉંમરે", distractors: ["૫ થી ૬ વર્ષની ઉંમરે", "૧૫ થી ૧૬ વર્ષની ઉંમરે", "૨૦ થી ૨૧ વર્ષની ઉંમરે"] },
        { q: "તરુણાવસ્થા કઈ ઉંમર સુધી ચાલે છે?", ans: "૧૮ થી ૧૯ વર્ષની ઉંમર સુધી", distractors: ["૧૬ થી ૧૭ વર્ષની ઉંમર સુધી", "૨૫ થી ૨૬ વર્ષની ઉંમર સુધી", "૩૦ થી ૩૧ વર્ષની ઉંમર સુધી"] },
        { q: "તરુણોને અંગ્રેજીમાં અન્ય કયા નામથી ઓળખવામાં આવે છે?", ans: "ટીનેજર્સ / Teenagers", distractors: ["કિડ્સ / Kids", "એડલ્ટ્સ / Adults", "ચિલ્ડ્રન / Children"] },
        { q: "છોકરાઓમાં તરુણાવસ્થા દરમિયાન ગળાના ભાગમાં ઉપસી આવતા ભાગને શું કહે છે?", ans: "કંઠમણિ / Adam's Apple", distractors: ["શ્વાસનળી", "અન્નનળી", "સ્વરપેટી"] },
        { q: "કંઠમણિનો વિકાસ થવાથી છોકરાઓના અવાજમાં શું ફેરફાર થાય છે?", ans: "અવાજ ઘેરો અને કર્કશ બને છે", distractors: ["અવાજ ઝીણો થાય છે", "અવાજ મીઠો થાય છે", "અવાજ ધીમો પડે છે"] },
        { q: "પ્રસ્વેદ અને તૈલી ગ્રંથિઓના વધુ પડતા સ્ત્રાવને કારણે તરુણોના ચહેરા પર શું થાય છે?", ans: "ખીલ", distractors: ["કરચલી", "ડાઘ", "સોજો"] },
        { q: "શરીરમાં રાસાયણિક પદાર્થો ઉત્પન્ન કરતી ગ્રંથિઓને શું કહેવાય?", ans: "અંતઃસ્ત્રાવી ગ્રંથિઓ / Endocrine Glands", distractors: ["પાચન ગ્રંથિઓ", "લાળ ગ્રંથિઓ", "પ્રસ્વેદ ગ્રંથિઓ"] },
        { q: "અંતઃસ્ત્રાવી ગ્રંથિઓ પોતાનો સ્ત્રાવ (Hormones) સીધો જ શેમાં મુક્ત કરે છે?", ans: "રુધિરમાં / લોહીમાં", distractors: ["જઠરમાં", "ફેફસામાં", "મગજમાં"] },
        { q: "નર (પુરુષ) જાતીય અંતઃસ્ત્રાવ કયો છે?", ans: "ટેસ્ટોસ્ટેરોન", distractors: ["ઇસ્ટ્રોજન", "ઇન્સ્યુલિન", "થાઇરોક્સિન"] },
        { q: "માદા (સ્ત્રી) જાતીય અંતઃસ્ત્રાવ કયો છે?", ans: "ઇસ્ટ્રોજન", distractors: ["ટેસ્ટોસ્ટેરોન", "એડ્રિનાલિન", "પિચ્યુટરી"] },
        { q: "જાતીય અંતઃસ્ત્રાવોના ઉત્પાદનનું નિયંત્રણ કઈ માસ્ટર ગ્રંથિ દ્વારા થાય છે?", ans: "પિચ્યુટરી ગ્રંથિ", distractors: ["થાઇરોઇડ ગ્રંથિ", "સ્વાદુપિંડ", "એડ્રિનલ ગ્રંથિ"] },
        { q: "પિચ્યુટરી ગ્રંથિ મનુષ્યના શરીરમાં ક્યાં આવેલી હોય છે?", ans: "મગજમાં", distractors: ["હૃદયમાં", "પેટમાં", "ગળામાં"] },
        { q: "ગળાના ભાગમાં આવેલી કઈ ગ્રંથિની ખામીથી 'ગોઇટર' નામનો રોગ થાય છે?", ans: "થાઇરોઇડ ગ્રંથિ", distractors: ["પિચ્યુટરી ગ્રંથિ", "સ્વાદુપિંડ", "એડ્રિનલ ગ્રંથિ"] },
        { q: "થાઇરોઇડ ગ્રંથિ કયો અંતઃસ્ત્રાવ ઉત્પન્ન કરે છે?", ans: "થાઇરોક્સિન", distractors: ["ઇન્સ્યુલિન", "એડ્રિનાલિન", "ટેસ્ટોસ્ટેરોન"] },
        { q: "થાઇરોક્સિનના યોગ્ય ઉત્પાદન માટે આહારમાં કયું તત્વ હોવું જરૂરી છે?", ans: "આયોડિન", distractors: ["કેલ્શિયમ", "આયર્ન", "મેગ્નેશિયમ"] },
        { q: "લોહીમાં શર્કરા (સુગર) નું પ્રમાણ જાળવી રાખતો અંતઃસ્ત્રાવ કયો છે?", ans: "ઇન્સ્યુલિન", distractors: ["થાઇરોક્સિન", "એડ્રિનાલિન", "ઇસ્ટ્રોજન"] },
        { q: "ઇન્સ્યુલિન કઈ ગ્રંથિ દ્વારા ઉત્પન્ન થાય છે?", ans: "સ્વાદુપિંડ / Pancreas", distractors: ["યકૃત", "જઠર", "કિડની"] },
        { q: "ઇન્સ્યુલિનની ઉણપથી કયો રોગ થાય છે?", ans: "ડાયાબિટીસ / મધુપ્રમેહ", distractors: ["ગોઇટર", "કેન્સર", "એડ્સ"] },
        { q: "ગુસ્સો, ચિંતા અને ઉત્તેજના સમયે તણાવને નિયંત્રિત કરતો અંતઃસ્ત્રાવ કયો છે?", ans: "એડ્રિનાલિન", distractors: ["ઇન્સ્યુલિન", "થાઇરોક્સિન", "ટેસ્ટોસ્ટેરોન"] },
        { q: "એડ્રિનાલિન અંતઃસ્ત્રાવ કઈ ગ્રંથિ ઉત્પન્ન કરે છે?", ans: "એડ્રિનલ ગ્રંથિ", distractors: ["થાઇરોઇડ ગ્રંથિ", "સ્વાદુપિંડ", "પિચ્યુટરી ગ્રંથિ"] },
        { q: "સ્ત્રીઓમાં પ્રજનન વયની શરૂઆત ક્યારથી થાય છે?", ans: "રજોદર્શનથી / ઋતુસ્ત્રાવની શરૂઆતથી", distractors: ["જન્મથી જ", "રજોનિવૃત્તિથી", "યુવાવસ્થા પછી"] },
        { q: "સ્ત્રીઓમાં માસિક સ્ત્રાવ (ઋતુસ્ત્રાવ) નું ચક્ર સામાન્ય રીતે કેટલા દિવસનું હોય છે?", ans: "૨૮ થી ૩૦ દિવસનું", distractors: ["૧૦ થી ૧૨ દિવસનું", "૧૫ થી ૨૦ દિવસનું", "૪૦ થી ૪૫ દિવસનું"] },
        { q: "સ્ત્રીઓમાં ૪૫ થી ૫૦ વર્ષની ઉંમરે ઋતુસ્ત્રાવ કાયમ માટે બંધ થવાની ક્રિયાને શું કહે છે?", ans: "રજોનિવૃત્તિ / Menopause", distractors: ["રજોદર્શન", "ઋતુસ્ત્રાવ", "પ્રજનન"] },
        { q: "દેડકામાં ટેડપોલમાંથી પુખ્ત દેડકો બનવાની ક્રિયા (કાયાંતરણ) માટે પાણીમાં કયું તત્વ હોવું જરૂરી છે?", ans: "આયોડિન - કારણ કે તે થાઇરોક્સિન બનાવે છે", distractors: ["ઓક્સિજન", "હાઇડ્રોજન", "નાઇટ્રોજન"] },
        { q: "કીટકોમાં કાયાંતરણનું નિયંત્રણ કોના દ્વારા થાય છે?", ans: "કીટ અંતઃસ્ત્રાવો દ્વારા", distractors: ["પર્યાવરણ દ્વારા", "મગજ દ્વારા", "હૃદય દ્વારા"] },
        { q: "મનુષ્યના દરેક કોષના કોષકેન્દ્રમાં કેટલા જોડ રંગસૂત્રો આવેલા હોય છે?", ans: "૨૩ જોડ / કુલ ૪૬", distractors: ["૨૦ જોડ / કુલ ૪૦", "૨૧ જોડ / કુલ ૪૨", "૨૪ જોડ / કુલ ૪૮"] },
        { q: "સ્ત્રીઓમાં કયા લિંગી રંગસૂત્રોની જોડ હોય છે?", ans: "XX", distractors: ["XY", "YY", "XZ"] },
        { q: "પુરુષમાં કયા લિંગી રંગસૂત્રોની જોડ હોય છે?", ans: "XY", distractors: ["XX", "YY", "XZ"] },
        { q: "આવનાર બાળક છોકરો હશે કે છોકરી, તેનો આધાર કોના પર રહેલો છે?", ans: "પિતાના રંગસૂત્ર પર / શુક્રકોષ પર", distractors: ["માતાના રંગસૂત્ર પર", "વાતાવરણ પર", "ઉંમર પર"] },

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let questions = [];
    let userAnswersData = [];
    let currentIdx = 0;
    let score = 0;

    function initQuiz() {
        let processedData = rawQuestions.map(qObj => {
            let options = [qObj.ans, ...qObj.distractors];
            return {
                q: qObj.q,
                correctAnswer: qObj.ans,
                options: shuffleArray(options)
            };
        });
        questions = shuffleArray(processedData);
        loadQuestion();
    }

    function loadQuestion() {
        const qData = questions[currentIdx];
        document.getElementById("progressText").innerText = `પ્રશ્ન: ${currentIdx + 1} / ${questions.length}`;
        document.getElementById("scoreText").innerText = `સ્કોર: ${score}`;
        document.getElementById("questionText").innerText = qData.q;
        
        const optionsDiv = document.getElementById("optionsContainer");
        optionsDiv.innerHTML = "";
        
        document.getElementById("answerFeedback").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";

        qData.options.forEach((opt) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, qData.correctAnswer, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selectedOpt, correctOpt, btn) {
        const allOptions = document.querySelectorAll(".option");
        let isCorrect = (selectedOpt === correctOpt);

        userAnswersData.push({
            question: questions[currentIdx].q,
            selected: selectedOpt,
            correct: correctOpt,
            isRight: isCorrect
        });

        allOptions.forEach(optBtn => {
            optBtn.disabled = true;
            if(optBtn.innerText === correctOpt) {
                optBtn.dataset.isCorrect = "true";
            }
        });

        if (isCorrect) {
            btn.classList.add("correct");
            score++;
            document.getElementById("scoreText").innerText = `સ્કોર: ${score}`;
        } else {
            btn.classList.add("wrong");
            allOptions.forEach(optBtn => {
                if(optBtn.dataset.isCorrect === "true") {
                    optBtn.classList.add("correct");
                }
            });
            
            const feedback = document.getElementById("answerFeedback");
            feedback.innerHTML = `❌ તમારો જવાબ ખોટો છે.<br>✅ <b>સાચો જવાબ:</b> ${correctOpt}`;
            feedback.style.display = "block";
        }
        
        document.getElementById("nextBtn").style.display = "block";
    }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("scoreBox").style.display = "block";
        document.getElementById("finalScore").innerText = score;
        document.getElementById("totalQuestions").innerText = questions.length;

        let summaryHTML = "";
        userAnswersData.forEach((data, index) => {
            let color = data.isRight ? "green" : "red";
            let icon = data.isRight ? "✅" : "❌";
            
            summaryHTML += `<div class="summary-item">
                <p class="summary-q">${index + 1}. ${data.question}</p>
                <p style="color: ${color}; font-weight: bold;">${icon} તમારો જવાબ: ${data.selected}</p>`;
                
            if (!data.isRight) {
                summaryHTML += `<p style="color: green; font-weight: bold;">✅ સાચો જવાબ: ${data.correct}</p>`;
            }
            summaryHTML += `</div>`;
        });
        
        document.getElementById("summaryContainer").innerHTML = summaryHTML;
    }

    initQuiz();
</script>
